default: true

# Line length — reduce progressively after long lines are fixed
MD013:
  line_length: 650
  code_blocks: false
  tables: false
  headings: false

# Inline HTML: MkDocs Material uses <br>, <kbd>, attribute lists, etc.
MD033:
  allowed_elements:
    - a
    - br
    - details
    - div
    - figcaption
    - figure
    - iframe
    - kbd
    - small
    - span
    - sub
    - summary
    - sup

# Disable rules that are not relevant to our style guide

# List markers can be either - or *
MD004: false

# Ingore unorded list indentation check
MD007: false

# Ignore need for blank lines around headings, lists, and code blocks
MD022: false

MD024:
  siblings_only: true

# Ignore issue of frontmatter title and first heading not matching
MD025: false

MD026: false
MD029:
  style: one_or_ordered
MD030: false

MD032: false
MD034: false

MD041: false

MD046: false
MD050: false
MD053: false
MD054: false
MD058: false
MD059: false
MD060: false
