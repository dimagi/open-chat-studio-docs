default: true

# Line length — reduce progressively after long lines are fixed
MD013:
  line_length: 650
  code_blocks: false
  tables: false
  headings: false

# Inline HTML: MkDocs Material uses <br>, <kbd>, attribute lists, etc.
MD033:
  allowed_elements:
    - a
    - br
    - details
    - div
    - figcaption
    - figure
    - iframe
    - kbd
    - small
    - span
    - sub
    - summary
    - sup

