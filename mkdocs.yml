site_name: Open Chat Studio Documentation
site_url: https://docs.openchatstudio.com
repo_url: https://github.com/dimagi/open-chat-studio-docs
edit_uri: edit/main/docs/
theme:
  name: material
  logo: assets/logo.png
  custom_dir: overrides
  features:
    - header.autohide
    - navigation.expand
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.prune
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.tracking
    - navigation.top
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
    - content.action.edit
    - content.action.view
    - content.code.annotate
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
copyright: Copyright &copy; 2024 Dimagi

extra_css:
  - assets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - pymdownx.blocks.caption
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

plugins:
- search
- git-revision-date-localized
- redirects:
    redirect_maps:
      'concepts/team/tracing_providers.md': 'concepts/tracing.md'
- macros:
    render_by_default: false
- mkdocstrings:
    enabled: true
    default_handler: python
    handlers:
      python:
        paths: [src]
        options:
          heading_level: 3
          show_root_full_path: false
          show_root_heading: true
          show_signature: true
          show_signature_annotations: true
          show_source: false
          show_symbol_type_heading: true

