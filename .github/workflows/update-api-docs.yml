name: Update API Documentation

on:
  repository_dispatch:
    types: [ ocs_api_update ]
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  update-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Fetch OpenAPI schema directory
        env:
          # Path to the per-version schema directory in the OCS repo.
          API_SCHEMA_DIR: api-schemas
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p schemas
          gh api "repos/dimagi/open-chat-studio/contents/${API_SCHEMA_DIR}?ref=main" \
            --jq '.[] | select(.name | test("\\.ya?ml$")) | .download_url' \
          | while read -r url; do
              echo "Downloading $url"
              curl -fsSL "$url" -O --output-dir schemas
            done
          echo "Fetched schema files:"
          ls -1 schemas

      - name: Generate API documentation
        run: uv run python src/ocs_docs/openapi_to_docs.py schemas -o docs/api/

      - name: Check for changes
        id: check_changes
        run: |
          # --porcelain catches untracked files too, so a brand-new version
          # directory (e.g. docs/api/v2/) is detected, not just edits to tracked files.
          if [ -z "$(git status --porcelain docs/api/)" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Generate app token
        if: steps.check_changes.outputs.has_changes == 'true'
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.OCS_AGENT_APP_ID }}
          private-key: ${{ secrets.OCS_AGENT_PRIVATE_KEY }}

      - name: Create Pull Request
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: "update API documentation from OpenAPI schema"
          title: "Update API Documentation"
          body: |
            ## Summary
            - Automated update of API documentation from OpenAPI schema
          branch: update-api-docs-${{ github.run_number }}
          delete-branch: true
          assignees: snopoke
          team-reviewers: dimagi/open-chat-studio
          labels: automated
