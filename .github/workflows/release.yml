name: Weekly Release Summary

on:
  schedule:
    # Run every Monday at 9:00 AM UTC
    - cron: '0 9 * * 1'

  # Allow manual triggering from GitHub Actions tab
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag for the release (e.g., v2025-10-23)'
        required: true
      release_name:
        description: 'Name for the release'
        required: false

jobs:
  create-weekly-release:
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0  # Fetch all history for all tags and branches

      - name: Generate tag name for scheduled run
        if: github.event_name == 'schedule'
        id: generate-tag
        run: |
          # Get current date in YYYY.MM.DD format
          CURRENT_DATE=$(date +"%Y.%m.%d")
          echo "RELEASE_TAG=v${CURRENT_DATE}" >> $GITHUB_ENV
          echo "RELEASE_NAME=Weekly Release ${CURRENT_DATE}" >> $GITHUB_ENV

      - name: Set manual release info
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "RELEASE_TAG=${{ github.event.inputs.release_tag }}" >> $GITHUB_ENV
          echo "RELEASE_NAME=${{ github.event.inputs.release_name || github.event.inputs.release_tag }}" >> $GITHUB_ENV

      - name: Create Release with Claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: /create-release ${{ env.RELEASE_TAG }} "${{ env.RELEASE_NAME }}"
          claude_args: |
            --model claude-sonnet-4-6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get release details
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$RELEASE_TAG" --json url,isDraft -q '.' > /dev/null 2>&1; then
            echo "url=$(gh release view "$RELEASE_TAG" --json url -q '.url')" >> "$GITHUB_OUTPUT"
            echo "is_draft=$(gh release view "$RELEASE_TAG" --json isDraft -q '.isDraft')" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify Slack
        if: steps.release.outputs.url
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RELEASE_URL: ${{ steps.release.outputs.url }}
          IS_DRAFT: ${{ steps.release.outputs.is_draft }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not set, skipping notification"
            exit 0
          fi

          if [ "$IS_DRAFT" = "true" ]; then
            BUTTON_TEXT="Review & Publish"
            STATUS="A new *draft* release is ready for review"
          else
            BUTTON_TEXT="View Release"
            STATUS="A new release has been published"
          fi

          payload=$(jq -n \
            --arg tag "$RELEASE_TAG" \
            --arg name "$RELEASE_NAME" \
            --arg url "$RELEASE_URL" \
            --arg status "$STATUS" \
            --arg button "$BUTTON_TEXT" \
            '{
              blocks: [
                {
                  type: "header",
                  text: { type: "plain_text", text: ("New OCS Release: " + $tag) }
                },
                {
                  type: "section",
                  text: { type: "mrkdwn", text: ($status + ": *" + $name + "*") },
                  accessory: {
                    type: "button",
                    text: { type: "plain_text", text: $button },
                    url: $url,
                    action_id: "view_release",
                    style: "primary"
                  }
                }
              ]
            }')

          curl -sfS -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$payload"
